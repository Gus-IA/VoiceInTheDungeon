<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Voice in the Dungeon</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, rgba(34, 197, 94, 0.15), transparent 55%),
                        radial-gradient(circle at bottom, rgba(15, 23, 42, 0.9), #020617);
            color: #e5e7eb;
        }
        .frame {
            width: 100%;
            max-width: 900px;
            margin: 2rem 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: radial-gradient(circle at top left, #020617, #020617 45%, #030712);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9), 0 0 0 1px rgba(15, 23, 42, 0.8);
            padding: 1.5rem 1.75rem 1.75rem;
            position: relative;
            overflow: hidden;
        }
        .frame-inner { position: relative; z-index: 1; }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .title-block { display: flex; flex-direction: column; gap: 0.15rem; }
        h1 { font-size: 1.4rem; margin: 0; letter-spacing: 0.08em; text-transform: uppercase; color: #e5e7eb; }
        .subtitle { font-size: 0.8rem; color: #9ca3af; }
        .badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            border: 1px solid rgba(34, 197, 94, 0.4);
            background: rgba(15, 23, 42, 0.9);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #bbf7d0;
        }
        .badge-dot { width: 7px; height: 7px; border-radius: 999px; background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.9); }
        #authStatus { font-size: 0.85rem; color: #bbf7d0; margin-right: 1rem; }
        #log {
            border-radius: 0.75rem;
            border: 1px solid rgba(55, 65, 81, 0.9);
            padding: 0.75rem 1rem;
            height: 320px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #020617, #020617 40%, #020617);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.875rem;
        }
        .log-entry { display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 0.5rem; padding: 0.4rem 0.6rem; border-radius: 0.35rem; border-left: 3px solid transparent; }
        .log-entry--player { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.08); }
        .log-entry--game { border-left-color: rgba(34, 197, 94, 0.7); background: rgba(15, 23, 42, 0.5); }
        .log-time { font-size: 0.7rem; color: #6b7280; }
        .log-text { flex: 1; white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
        .log-entry--player .log-text { color: #93c5fd; font-weight: 500; }
        button {
            margin-top: 0.1rem;
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.4);
        }
        #saveBtn, #loadBtn { background: rgba(15,23,42,0.95); border: 1px solid rgba(55,65,81,0.9); box-shadow: none; font-size: 0.8rem; padding: 0.4rem 1rem; }
        .input { flex: 1; padding: 0.55rem 0.85rem; border-radius: 999px; border: 1px solid #4b5563; background: #020617; color: #e5e7eb; outline: none; }
        #sendBtn { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .is-listening {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            animation: pulse 1.5s infinite;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4) !important;
        }

        .status { margin-top: 0.6rem; font-size: 0.8rem; color: #9ca3af; }
        .scene {
            position: relative;
            margin-bottom: 1rem;
            border-radius: 0.9rem;
            border: 1px solid rgba(30, 64, 175, 0.6);
            background: radial-gradient(circle at 20% 0%, rgba(56, 189, 248, 0.16), transparent 55%),
                        linear-gradient(to bottom, #020617, #020617 40%, #020617);
            overflow: hidden;
            padding: 0.9rem 1rem;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 0.75rem;
        }

        /* Modal Auth Styles */
        #loginModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #030712; padding: 2.5rem; border-radius: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.2); width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-content input {
            width: 100%; margin-bottom: 1rem; padding: 0.75rem 1rem;
            border-radius: 0.75rem; border: 1px solid #334155; background: #0f172a; color: white;
        }
    </style>
</head>
<body>
    <div id="loginModal" style="display:none;">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0; margin-bottom:1.5rem; text-align:center;">Entrar al calabozo</h2>
            <input type="text" id="usernameInput" placeholder="Nombre de usuario">
            <input type="password" id="passwordInput" placeholder="Contraseña">
            <button id="authBtn" style="width:100%;">Entrar</button>
            <button id="toggleAuthMode" style="background:none; box-shadow:none; font-size:0.85rem; width:100%; text-decoration:underline; color:#94a3b8; margin-top:0.5rem;">¿No tienes cuenta? Regístrate</button>
            <div id="authMsg" style="margin-top:1rem; text-align:center; color:#ef4444; font-size:0.85rem;"></div>
        </div>
    </div>

    <div class="frame" id="gameUI" style="display:none;">
        <div class="frame-inner">
            <header>
                <div class="title-block">
                    <h1>Voice in the Dungeon</h1>
                    <div class="subtitle">Aventura de voz en una mazmorra oscura</div>
                </div>
                <div style="display:flex; align-items:center;">
                    <div id="authStatus"></div>
                    <button id="logoutBtn" style="display:none; background:#475569; font-size:0.75rem; padding:0.3rem 0.8rem; margin-top:0;">Salir</button>
                </div>
            </header>
            
            <div class="scene">
                <p style="font-size:0.85rem; color:#94a3b8; margin:0;">
                    <strong>Despiertas en una cámara de piedra.</strong> Una puerta arqueada se abre hacia la oscuridad. Tu voz es la única herramienta para escapar.
                </p>
                <div style="background:radial-gradient(circle, #064e3b, #020617); border-radius:0.5rem; height:80px; display:flex; align-items:center; justify-content:center; border:1px solid #065f46;">
                    <span style="font-size:2rem;">👁️</span>
                </div>
            </div>

            <div id="log" role="log"></div>

            <div style="margin-top:1rem; display:flex; gap:0.5rem; align-items:center;">
                <button id="speakBtn">🎙️ Hablar</button>
                <input id="textInput" type="text" placeholder="Escribe un comando..." class="input">
                <button id="sendBtn">Enviar</button>
            </div>

            <div class="status" id="status"></div>

            <div style="margin-top:1rem; display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                <button id="saveBtn">💾 Guardar</button>
                <button id="loadBtn">📂 Cargar</button>
                <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem;">
                    <label for="langSelect" style="font-size:0.8rem; color:#94a3b8;">Idioma:</label>
                    <select id="langSelect" style="padding:0.3rem; border-radius:0.4rem; background:#0f172a; color:white; border:1px solid #334155; font-size:0.8rem;">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="it">Italiano</option>
                        <option value="pt">Português</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Cargar scripts desde /static para evitar 404 en subrutas -->
    <script type="module" src="/static/main.js"></script>
</body>
</html>
